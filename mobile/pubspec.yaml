name: buzz
description: Buzz mobile client
publish_to: 'none'
version: 0.4.4+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3
  lucide_icons_flutter: ^3.1.0
  http: ^1.4.0
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.4
  mobile_scanner: ^7.0.0
  shared_preferences: ^2.5.5
  web_socket_channel: ^3.0.1
  connectivity_plus: ^7.0.0
  nostr: ^2.0.0
  pointycastle: ^4.0.0
  url_launcher: ^6.3.2
  gpt_markdown: ^1.1.6
  highlight: ^0.7.0
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  video_player: ^2.10.1
  package_info_plus: ^10.0.0
  app_badge_plus: ^1.2.10
  app_links: ^6.4.0
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.1.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/buzz-icon.png
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
        - asset: assets/fonts/InterVariable-Italic.ttf
          style: italic
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Variable.ttf
        - asset: assets/fonts/GeistMono-Italic-Variable.ttf
          style: italic
